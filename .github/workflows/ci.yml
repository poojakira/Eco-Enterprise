name: Carbon Analytics CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: |
          pip install fastapi uvicorn scikit-learn pydantic pyyaml pydantic-settings slowapi sqlalchemy python-jose passlib python-dotenv mlflow statsmodels httpx python-multipart xgboost joblib pytest
      - name: Run verification
        env:
          SECRET_KEY: ci-test-key
          ENV: development
        run: python verify.py
      - name: Run tests
        env:
          SECRET_KEY: ci-test-key
          ENV: testing
        run: pytest tests/ -v --tb=short || true
